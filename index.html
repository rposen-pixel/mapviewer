<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GeoTIFF Map with Inset</title>
  <link rel="stylesheet" href="./vendor/leaflet.css" />
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --border: #1f2937;
      --accent: #38bdf8;
      --text: #e5e7eb;
      --muted: #94a3b8;
    }
    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: #0b1220;
    }
    header h1 {
      font-size: 18px;
      margin: 0 0 6px 0;
      font-weight: 600;
      color: #e2e8f0;
    }
    header p {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
    }
    .controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    @media (max-width: 1100px) {
      .controls {
        grid-template-columns: 1fr;
      }
    }
    .control {
      background: #0b1220;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }
    .control h2 {
      margin: 0 0 8px 0;
      font-size: 14px;
      color: #e2e8f0;
      font-weight: 600;
    }
    .control p {
      margin: 0 0 10px 0;
      font-size: 12px;
      color: var(--muted);
    }
    .control input[type="file"] {
      width: 100%;
      padding: 8px;
      background: #0f172a;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .status {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }
    .map-wrap {
      position: relative;
      padding: 12px 20px 20px;
      max-width: 780px;
      margin: 0 auto;
    }
    #map-main {
      position: relative;
      z-index: 1;
      width: 100%;
      aspect-ratio: 4 / 5;
      height: auto;
      min-height: 760px;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #0b1220;
    }
    #map-inset {
      position: absolute;
      z-index: 20;
      left: 32px;
      bottom: 32px;
      width: 230px;
      height: 170px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      overflow: hidden;
      background: #0b1220;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      transition: width 0.2s ease, height 0.2s ease;
    }
    #map-inset.inset-expanded {
      width: 420px;
      height: 300px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
    }
    .inset-label {
      position: absolute;
      left: 14px;
      top: 12px;
      background: rgba(15, 23, 42, 0.85);
      color: #e2e8f0;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(226, 232, 240, 0.2);
      z-index: 520;
    }
    .locate-btn {
      position: absolute;
      right: 26px;
      top: 26px;
      z-index: 600;
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .locate-btn:hover {
      border-color: #38bdf8;
    }
  </style>
</head>
<body>
  <header>
    <h1>GeoTIFF Map with Inset</h1>
    <p>Load two GeoTIFFs from your computer. The inset sits on top of the main map.</p>
  </header>

  <section class="controls">
    <div class="control">
      <h2>Main map</h2>
      <p class="badge"><span class="dot"></span> Choose the large‑scale GeoTIFF</p>
      <input id="file-main" type="file" accept=".tif,.tiff" />
      <div class="status" id="status-main">No file loaded</div>
    </div>
    <div class="control">
      <h2>Inset map</h2>
      <p class="badge"><span class="dot"></span> Choose the small‑scale GeoTIFF</p>
      <input id="file-inset" type="file" accept=".tif,.tiff" />
      <div class="status" id="status-inset">No file loaded</div>
    </div>
    <div class="control">
      <h2>Test location</h2>
      <p class="badge"><span class="dot"></span> Enter coordinates (lat, lon)</p>
      <div style="display:flex; gap:8px;">
        <input id="test-lat" type="text" placeholder="Lat (decimal or DMS)" style="flex:1;" />
        <input id="test-lon" type="text" placeholder="Lon (decimal or DMS)" style="flex:1;" />
      </div>
      <div style="margin-top:8px; display:flex; gap:8px;">
        <button id="test-location" style="flex:1; padding:8px 10px; border-radius:8px; border:1px solid #334155; background:#0f172a; color:#e2e8f0; cursor:pointer;">Set test location</button>
        <button id="clear-location" style="flex:1; padding:8px 10px; border-radius:8px; border:1px solid #334155; background:#0f172a; color:#e2e8f0; cursor:pointer;">Clear marker</button>
      </div>
    </div>
  </section>

  <section class="map-wrap">
    <button class="locate-btn" id="locate-btn">Show my location</button>
    <div id="map-main"></div>
    <div id="map-inset">
      <div class="inset-label">Inset map</div>
    </div>
  </section>

  <script src="./vendor/leaflet.js"></script>
  <script src="./vendor/georaster.browser.bundle.min.js"></script>
  <script src="./vendor/georaster-layer-for-leaflet.min.js"></script>

  <script>
    let mapMain = null;
    let mapInset = null;
    let mainBounds = null;
    let insetBounds = null;
    let mainMarker = null;
    let insetMarker = null;

    const locationIcon = L.divIcon({
      className: "location-pin",
      html: "<div style='width:16px;height:16px;background:#f43f5e;border:2px solid white;border-radius:50%;box-shadow:0 0 0 4px rgba(244,63,94,0.25)'></div>",
      iconSize: [16, 16],
      iconAnchor: [8, 8],
    });

    function createMap(containerId, projection) {
      const crs = projection === 4326 || projection === "EPSG:4326" ? L.CRS.EPSG4326 : L.CRS.EPSG3857;
      const map = L.map(containerId, {
        zoomControl: true,
        attributionControl: false,
        crs,
        zoomSnap: 0,
        zoomDelta: 0.25,
        wheelPxPerZoomLevel: 60,
        maxBoundsViscosity: 1.0,
      });
      map.getPane("tilePane").style.zIndex = containerId === "map-inset" ? 400 : 200;
      return map;
    }

    function ensureMap(map, containerId, projection) {
      if (!map) return createMap(containerId, projection);
      const needs4326 = projection === 4326 || projection === "EPSG:4326";
      const is4326 = map.options.crs === L.CRS.EPSG4326;
      if (needs4326 !== is4326) {
        map.remove();
        return createMap(containerId, projection);
      }
      return map;
    }

    async function loadGeotiff(file, map, containerId, statusId, boundsSetter) {
      if (!file) return map;
      const status = document.getElementById(statusId);
      status.textContent = "Loading...";
      const timeout = setTimeout(() => {
        if (status.textContent === "Loading...") {
          status.textContent = "Still loading…";
          alert("This file is taking a long time to load. Try a smaller export or a cropped version.");
        }
      }, 8000);
      try {
        const arrayBuffer = await file.arrayBuffer();
        const georaster = await parseGeoraster(arrayBuffer);
        if (!georaster) throw new Error("No raster data found");
        map = ensureMap(map, containerId, georaster.projection);

        const isSingleBand = georaster.numberOfRasters === 1;
        const mins = georaster.mins || [];
        const maxs = georaster.maxs || [];
        const dataType = (georaster.dataType || "").toLowerCase();
        const useCustomColor = !(dataType === "uint8" || dataType === "uint16");
        const scale = (val, min, max) => {
          if (val === null || val === undefined) return null;
          if (min === max) return 0;
          const scaled = Math.round(((val - min) / (max - min)) * 255);
          return Math.max(0, Math.min(255, scaled));
        };

        const layerOptions = {
          georaster,
          opacity: 1,
          resolution: 256,
          useWorker: false,
        };

        if (useCustomColor) {
          layerOptions.pixelValuesToColorFn = (values) => {
            if (!values) return null;
            if (isSingleBand) {
              const v = scale(values[0], mins[0], maxs[0]);
              if (v === null) return null;
              return `rgb(${v}, ${v}, ${v})`;
            }
            const r = scale(values[0], mins[0], maxs[0]);
            const g = scale(values[1], mins[1], maxs[1]);
            const b = scale(values[2], mins[2], maxs[2]);
            if (r === null || g === null || b === null) return null;
            return `rgb(${r}, ${g}, ${b})`;
          };
        }

        const layer = new GeoRasterLayer(layerOptions);

        layer.addTo(map);
        const bounds = layer.getBounds();
        boundsSetter(bounds);
        map.fitBounds(bounds, { animate: false });
        map.setMaxBounds(bounds);
        const minZoom = map.getBoundsZoom(bounds, false);
        map.setMinZoom(minZoom);

        const mapSize = map.getSize();
        const pixelWidth = georaster.width || georaster.rasterWidth || 0;
        const pixelHeight = georaster.height || georaster.rasterHeight || 0;
        let maxZoom = minZoom + 4;
        if (pixelWidth > 0 && pixelHeight > 0) {
          const zoomForWidth = Math.log2(pixelWidth / mapSize.x) + minZoom;
          const zoomForHeight = Math.log2(pixelHeight / mapSize.y) + minZoom;
          maxZoom = Math.max(zoomForWidth, zoomForHeight);
        }
        map.setMaxZoom(maxZoom);
        map.setZoom(minZoom);
        setTimeout(() => map.invalidateSize(), 200);
        clearTimeout(timeout);
        status.textContent = `Loaded ✓ (CRS: ${georaster.projection || "unknown"}, type: ${georaster.dataType || "n/a"}, max zoom: ${maxZoom.toFixed(2)})`;
      } catch (error) {
        clearTimeout(timeout);
        const message = error && error.message ? error.message : "Unknown error";
        status.textContent = "Failed to load";
        alert("That GeoTIFF could not be loaded.\n\nDetails: " + message + "\n\nPlease try exporting as GeoTIFF in EPSG:3857 (or 4326). If it still fails, share the error details so I can adjust the viewer.");
      }
      return map;
    }

    document.getElementById("file-main").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      mapMain = await loadGeotiff(file, mapMain, "map-main", "status-main", (b) => (mainBounds = b));
    });

    document.getElementById("file-inset").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      mapInset = await loadGeotiff(file, mapInset, "map-inset", "status-inset", (b) => (insetBounds = b));
    });

    function clearMarkers() {
      if (mainMarker && mapMain) {
        mapMain.removeLayer(mainMarker);
        mainMarker = null;
      }
      if (insetMarker && mapInset) {
        mapInset.removeLayer(insetMarker);
        insetMarker = null;
      }
    }

    function setInsetExpanded(expanded) {
      const inset = document.getElementById("map-inset");
      if (expanded) {
        inset.classList.add("inset-expanded");
      } else {
        inset.classList.remove("inset-expanded");
      }
      if (mapInset) {
        setTimeout(() => mapInset.invalidateSize(), 200);
      }
    }

    function showLocationOnMap(latlng) {
      clearMarkers();
      if (mainBounds && mainBounds.contains(latlng)) {
        setInsetExpanded(false);
        mainMarker = L.marker(latlng, { icon: locationIcon }).addTo(mapMain);
        mapMain.setView(latlng, Math.max(mapMain.getZoom(), 16));
        return;
      }
      if (insetBounds && insetBounds.contains(latlng)) {
        setInsetExpanded(true);
        insetMarker = L.marker(latlng, { icon: locationIcon }).addTo(mapInset);
        mapInset.setView(latlng, Math.max(mapInset.getZoom(), 10));
        return;
      }
      setInsetExpanded(true);
      if (mainBounds && mapMain) {
        mapMain.fitBounds(mainBounds, { padding: [20, 20] });
      }
      if (insetBounds && mapInset) {
        mapInset.fitBounds(insetBounds, { padding: [10, 10] });
      }
      alert("Your location is outside both map areas, so I zoomed out to show each map.");
    }

    document.getElementById("locate-btn").addEventListener("click", () => {
      if (!navigator.geolocation) {
        alert("Location access is not available in this browser.");
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const latlng = L.latLng(pos.coords.latitude, pos.coords.longitude);
          showLocationOnMap(latlng);
        },
        () => {
          alert("Could not access your location. Please allow location access and try again.");
        },
        { enableHighAccuracy: true, timeout: 15000 }
      );
    });

    function parseCoordinate(input) {
      const value = (input || "").trim();
      if (!value) return NaN;
      const hasDms = /[°'"NSEW]/i.test(value);
      if (!hasDms) return parseFloat(value);

      let cleaned = value
        .replace(/[^0-9NSEW\-. ]+/gi, " ")
        .replace(/\s+/g, " ")
        .trim();

      let sign = /[SW]/i.test(cleaned) ? -1 : 1;
      cleaned = cleaned.replace(/[NSEW]/ig, " ").trim();
      const parts = cleaned.split(" ").filter(Boolean).map(Number);
      if (!parts.length) return NaN;
      const deg = parts[0] || 0;
      const min = parts[1] || 0;
      const sec = parts[2] || 0;
      const dec = Math.abs(deg) + min / 60 + sec / 3600;
      return dec * sign * (deg < 0 ? -1 : 1);
    }

    document.getElementById("test-location").addEventListener("click", () => {
      const lat = parseCoordinate(document.getElementById("test-lat").value);
      const lon = parseCoordinate(document.getElementById("test-lon").value);
      if (Number.isNaN(lat) || Number.isNaN(lon)) {
        alert("Please enter both latitude and longitude (decimal or DMS).\nExample: 32° 59' 10\" N");
        return;
      }
      const latlng = L.latLng(lat, lon);
      showLocationOnMap(latlng);
    });

    document.getElementById("clear-location").addEventListener("click", () => {
      clearMarkers();
    });
  </script>
</body>
</html>
